env:
  TERM: xterm-256color

window:
  dimensions:
    columns: 100
    lines: 32

font:
  normal:
    family: MesloLGS NF
    style: Regular
  
  bold:
    family: MesloLGS NF
    style: Bold

  italic:
    family: MesloLGS NF
    style: Italic

  size: 10.0

colors:
  # Default colors
  primary:
    background: '0x1e2127'
    foreground: '0x5c6370'

  # Normal colors
  normal:
    black:   '0x000000'
    red:     '0xe06c75'
    green:   '0x98c379'
    yellow:  '0xd19a66'
    blue:    '0x61afef'
    magenta: '0xc678dd'
    cyan:    '0x56b6c2'
    white:   '0xabb2bf'

  # Bright colors
  bright:
    black:   '0x5c6370'
    red:     '0xe06c75'
    green:   '0x98c379'
    yellow:  '0xd19a66'
    blue:    '0x61afef'
    magenta: '0xc678dd'
    cyan:    '0x56b6c2'
    white:   '0xfffefe'

dynamic_title: true

live_config_reload: true

shell:
  program: /bin/zsh
